<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix League Scoreboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configure Babel to use the classic JSX runtime (React.createElement) to avoid import errors -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>

    <!-- Custom Styles for Seamless Ticker Animation -->
    <style>
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            animation: marquee 25s linear infinite;
            width: max-content;
        }

        /* Pause ticker on hover if needed */
        .animate-marquee:hover {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    
    <!-- Firebase Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQHLPDg78vUGqRNV3RO2jsgUsy7KIiPZA",
            authDomain: "helix-scored-broad.firebaseapp.com",
            projectId: "helix-scored-broad",
            storageBucket: "helix-scored-broad.firebasestorage.app",
            messagingSenderId: "36097019302",
            appId: "1:36097019302:web:e7347cdbe7637b96cc5367",
            measurementId: "G-KWTLDRXW3K"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        
        window.firebaseDb = db;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseGet = get;
        
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script type="text/babel" data-presets="react-classic">

        // Nation Options for the Helix League World Cup Edition

                squad: [
                    { pos: 'GK', name: 'ASIF MAHMUD (C)' },
                    { pos: 'DEF', name: 'Absaruzzaman' },
                    { pos: 'DEF', name: 'SADMAN SAKIB' },
                    { pos: 'MID', name: 'Tamjid Ashfi' },

                ]

        ];

        // Sponsor Options
        const SPONSOR_OPTIONS = [
            {
                name: "UniWay",
                type: "Title Sponsor",
                details: "The Smart Way to Study Abroad",
                logo: "uniway.png"
            },
            {
                name: "Kick.Official",
                type: "Venue Partner",
                details: "Game Starts Here",
                logo: "kick.png"
            },
            {
                name: "Driviso",
                type: "Production Partner",

                logo: "driviso.png"
            },
            {

                logo: "skino.png"
            },
            {
                name: "INK 173",
                type: "Auction Venue Partner",
                details: "Innovation, Networking, Knowledge",
                logo: "ink173.png"
            },
            {
                name: "Bangladesh Football Live",
                type: "Online Media Partner",
                details: "Online Media Partner",
                logo: "bd_football_live.png"
            },
            {
                name: "SportsTab",
                type: "Online Media Partner",
                details: "Online Media Partner",
                logo: "sportstab.png"
            },
            {
                name: "Aliza's Kitchen",
                type: "Official Cake Partner",
                details: "Celebrate Your Happiness",
                logo: "alizas_kitchen.jpg"
            }
        ];

        // Fallback image handler for missing flag images
        const handleImageError = (e) => {
            e.target.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSIyOCI+PHJlY3Qgd2lkdGg9IjQwIiBoZWlnaHQ9IjI4IiBmaWxsPSIjY2NjIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTAiIGZpbGw9IiM2NjYiIGFsaWdubWVudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5GbGFnPC90ZXh0Pjwvc3ZnPg==';
        };

        
        
        
        const useSharedState = (key, initialValue, isController) => {
            const [state, setState] = React.useState(initialValue);
            const [isLoaded, setIsLoaded] = React.useState(false);
            const [fbReady, setFbReady] = React.useState(!!window.firebaseDb);

            React.useEffect(() => {
                if (!window.firebaseDb) {
                    const listener = () => setFbReady(true);
                    window.addEventListener('firebaseReady', listener);
                    return () => window.removeEventListener('firebaseReady', listener);
                }
            }, []);

            // Initial Load for controller
            React.useEffect(() => {
                if (isController && fbReady && !isLoaded) {
                    const stateRef = window.firebaseRef(window.firebaseDb, 'scoreboard/' + key);
                    window.firebaseGet(stateRef).then((snapshot) => {
                        if (snapshot.exists()) {
                            setState(snapshot.val());
                        }
                        setIsLoaded(true);
                    });
                }
            }, [key, isController, fbReady, isLoaded]);

            // Write to Firebase (Controller only)
            React.useEffect(() => {
                if (isController && fbReady && isLoaded) {
                    const stateRef = window.firebaseRef(window.firebaseDb, 'scoreboard/' + key);
                    window.firebaseSet(stateRef, state);
                }
            }, [key, state, isController, fbReady, isLoaded]);

            // Listen to Firebase (Viewer only)
            React.useEffect(() => {
                if (!isController && fbReady) {
                    const stateRef = window.firebaseRef(window.firebaseDb, 'scoreboard/' + key);
                    const unsubscribe = window.firebaseOnValue(stateRef, (snapshot) => {
                        const val = snapshot.val();
                        if (val !== null) {
                            setState(val);
                        }
                    });
                    return () => unsubscribe();
                }
            }, [key, isController, fbReady]);

            return [state, setState];
        };

        const HelixScoreboard = () => {
            const isController = true; // Control Center

            // Team States
            const [team1, setTeam1] = useSharedState('hl_team1', NATION_OPTIONS[0], isController);
            const [team2, setTeam2] = useSharedState('hl_team2', NATION_OPTIONS[1], isController);
            const [score1, setScore1] = useSharedState('hl_score1', 0, isController);
            const [score2, setScore2] = useSharedState('hl_score2', 0, isController);

            // Timer States
            const [time, setTime] = useSharedState('hl_time', 0, isController);
            const [isRunning, setIsRunning] = useSharedState('hl_isRunning', false, isController);
            const [half, setHalf] = useSharedState('hl_half', 1, isController);
            const [extraTime, setExtraTime] = useSharedState('hl_extraTime', 0, isController);
            const timerRef = useRef(null);

            // Match Events
            const [events, setEvents] = useSharedState('hl_events', [], isController);

            // UI States
            const [broadcastMode, setBroadcastMode] = useSharedState('hl_broadcastMode', false, isController);
            const [greenScreen, setGreenScreen] = useSharedState('hl_greenScreen', false, isController);
            const [squadDisplay, setSquadDisplay] = useSharedState('hl_squadDisplay', { active: false, teamNum: null }, isController);
            const [showResetConfirm, setShowResetConfirm] = useState(false); // Local only

            // Match Context States
            const [matchPhase, setMatchPhase] = useSharedState('hl_matchPhase', 'Group Stage', isController);
            const [penalties, setPenalties] = useSharedState('hl_penalties', { active: false, kicks1: [], kicks2: [] }, isController);

            // Broadcast Overlays (L-Shape & Ticker)
            const [overlayL, setOverlayL] = useSharedState('hl_overlayL', false, isController);
            const [overlayTicker, setOverlayTicker] = useSharedState('hl_overlayTicker', false, isController);
            const [activeSponsorIndex, setActiveSponsorIndex] = useSharedState('hl_activeSponsorIndex', 0, isController);
            const activeSponsor = SPONSOR_OPTIONS[activeSponsorIndex];
            const [tickerText1, setTickerText1] = useSharedState('hl_tickerText1', "Brazil clinches dramatic 2-1 victory over Argentina in opener", isController);
            const [tickerText2, setTickerText2] = useSharedState('hl_tickerText2', "Spain vs Germany - Kickoff at 8:30 PM Local Time", isController);

            // NEW: Player Specific Overlays (Goal, Card, MOTM)
            const [playerGraphic, setPlayerGraphic] = useSharedState('hl_playerGraphic', { active: false, type: '', player: null, team: null }, isController);
            const [graphicTeamNum, setGraphicTeamNum] = useState(1); // Local only
            const [graphicPlayerName, setGraphicPlayerName] = useState(''); // Local only

            // Computed Penalty Scores
            const penScore1 = penalties.kicks1.filter(k => k === 'goal').length;
            const penScore2 = penalties.kicks2.filter(k => k === 'goal').length;

            // Goal Animation State
            const [goalAlert, setGoalAlert] = useSharedState('hl_goalAlert', { active: false, team: null }, isController);
            const goalTimeoutRef = useRef(null);

            useEffect(() => {
                if (isRunning) {
                    timerRef.current = setInterval(() => {
                        setTime((prevTime) => prevTime + 1);
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isRunning]);

            // Keep player graphic selection valid if team changes
            useEffect(() => {
                const team = graphicTeamNum === 1 ? team1 : team2;
                if (team && team.squad && team.squad.length > 0) {
                    if (!team.squad.find(p => p.name === graphicPlayerName)) {
                        setGraphicPlayerName(team.squad[0].name);
                    }
                }
            }, [graphicTeamNum, team1, team2]);

            const formatTime = (totalSeconds) => {
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            };

            const addEvent = (teamCode, type, details = '') => {
                const eventTime = Math.floor(time / 60);
                setEvents([{ time: eventTime, team: teamCode, type, details }, ...events]);
            };

            const triggerGoalAlert = (team) => {
                if (goalTimeoutRef.current) clearTimeout(goalTimeoutRef.current);
                setGoalAlert({ active: true, team });
                goalTimeoutRef.current = setTimeout(() => {
                    setGoalAlert({ active: false, team: null });
                }, 6000); // Display for 6 seconds
            };

            const triggerPlayerGraphic = (type) => {
                const team = graphicTeamNum === 1 ? team1 : team2;
                const player = team.squad.find(p => p.name === graphicPlayerName) || team.squad[0];
                setPlayerGraphic({ active: true, type, player, team });
            };

            const handleScoreChange = (teamNum, increment) => {
                if (teamNum === 1) {
                    const newScore = Math.max(0, score1 + increment);
                    setScore1(newScore);
                    if (increment > 0) {
                        addEvent(team1.code, 'GOAL');
                        triggerGoalAlert(team1);
                    }
                } else {
                    const newScore = Math.max(0, score2 + increment);
                    setScore2(newScore);
                    if (increment > 0) {
                        addEvent(team2.code, 'GOAL');
                        triggerGoalAlert(team2);
                    }
                }
            };

            const executeReset = () => {
                setScore1(0);
                setScore2(0);
                setTime(0);
                setIsRunning(false);
                setHalf(1);
                setExtraTime(0);
                setEvents([]);
                setSquadDisplay({ active: false, teamNum: null });
                setPenalties({ active: false, kicks1: [], kicks2: [] });
                setPlayerGraphic({ active: false, type: '', player: null, team: null });
                setShowResetConfirm(false);
            };

            const handlePenaltyKick = (teamNum, result) => {
                setPenalties(prev => {
                    const key = teamNum === 1 ? 'kicks1' : 'kicks2';
                    return { ...prev, [key]: [...prev[key], result] };
                });
            };

            const undoPenaltyKick = (teamNum) => {
                setPenalties(prev => {
                    const key = teamNum === 1 ? 'kicks1' : 'kicks2';
                    const newKicks = [...prev[key]];
                    newKicks.pop();
                    return { ...prev, [key]: newKicks };
                });
            };

            return (
                <div className={`relative min-h-screen font-sans overflow-x-hidden ${broadcastMode ? (greenScreen ? 'bg-[#00FF00]' : 'bg-[url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iI2YwZjBmMCIvPgo8cmVjdCB4PSIxMCIgeT0iMTAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iI2YwZjBmMCIvPgo8L3N2Zz4=")]') : 'bg-slate-900 text-slate-200'}`}>

                    {/* Control Dashboard */}
                    {!broadcastMode && (
                        <div className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 relative">

                            {/* Left Column: Team 1 Controls */}
                            <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                                <h2 className="text-xl font-bold text-slate-300 mb-4 border-b border-slate-700 pb-2 flex items-center gap-3">
                                    <img onError={handleImageError} src={team1.flag} alt="flag" className="w-8 h-5 object-cover rounded-sm shadow-sm" /> Home Team Control
                                </h2>

                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-slate-400 mb-1">Select Nation</label>
                                    <select
                                        value={team1.code}
                                        onChange={(e) => setTeam1(NATION_OPTIONS.find(n => n.code === e.target.value))}
                                        className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                    >
                                        {NATION_OPTIONS.map(nation => (
                                            <option key={nation.code} value={nation.code}>{nation.emoji} {nation.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="flex flex-col items-center bg-slate-900/50 p-6 rounded-lg mb-6">
                                    <span className="text-5xl font-black mb-4 text-white tabular-nums">{score1}</span>
                                    <div className="flex gap-3 w-full">
                                        <button onClick={() => handleScoreChange(1, -1)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">-1</button>
                                        <button onClick={() => handleScoreChange(1, 1)} className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors shadow-[0_0_10px_rgba(22,163,74,0.3)]">GOAL!</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => addEvent(team1.code, 'YELLOW')} className="bg-yellow-500 hover:bg-yellow-400 text-yellow-900 font-bold py-2 rounded shadow-sm">Yellow Card</button>
                                    <button onClick={() => addEvent(team1.code, 'RED')} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded shadow-sm">Red Card</button>
                                </div>

                                <button
                                    onClick={() => setSquadDisplay({ active: squadDisplay.teamNum !== 1 || !squadDisplay.active, teamNum: 1 })}
                                    className={`mt-4 w-full py-3 rounded-lg font-bold uppercase tracking-wider transition-all duration-300 ${squadDisplay.active && squadDisplay.teamNum === 1 ? 'bg-indigo-600 text-white shadow-inner scale-[0.98]' : 'bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600 hover:border-slate-500 shadow-md'}`}
                                >
                                    {squadDisplay.active && squadDisplay.teamNum === 1 ? 'Hide Starting VII' : 'Show Starting VII Graphic'}
                                </button>
                            </div>

                            {/* Middle Column: Match Controls */}
                            <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg flex flex-col">
                                <h2 className="text-xl font-bold text-slate-300 mb-4 border-b border-slate-700 pb-2">Match Controls</h2>

                                <div className="flex-1 flex flex-col items-center justify-center">
                                    <div className="text-6xl font-mono font-bold text-white mb-2 tabular-nums">
                                        {formatTime(time)}
                                    </div>
                                    <div className="text-sm text-slate-400 mb-8 uppercase tracking-widest font-bold">
                                        {half === 1 ? '1st Half' : half === 2 ? '2nd Half' : 'Extra Time'}
                                    </div>

                                    {/* Match Phase Selector */}
                                    <div className="w-full mb-6 flex flex-col gap-2 border-b border-slate-700 pb-4">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider text-center mb-1">Match Phase / Rules</label>
                                        <div className="flex gap-2">
                                            <button onClick={() => setMatchPhase('Group Stage')} className={`flex-1 py-1.5 text-xs font-bold rounded transition-colors ${matchPhase === 'Group Stage' ? 'bg-amber-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>Group</button>
                                            <button onClick={() => setMatchPhase('Semi Final')} className={`flex-1 py-1.5 text-xs font-bold rounded transition-colors ${matchPhase === 'Semi Final' ? 'bg-amber-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>Semi</button>
                                            <button onClick={() => setMatchPhase('Final')} className={`flex-1 py-1.5 text-xs font-bold rounded transition-colors ${matchPhase === 'Final' ? 'bg-amber-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>Final</button>
                                        </div>
                                        {matchPhase === 'Group Stage' && <p className="text-[10px] text-center text-slate-500 mt-1">10 mins per match • No Half</p>}
                                        {matchPhase === 'Semi Final' && <p className="text-[10px] text-center text-slate-500 mt-1">7 min halves • 1 min Added Time • Pens for Ties</p>}
                                        {matchPhase === 'Final' && <p className="text-[10px] text-center text-slate-500 mt-1">10 min halves • 1 min Added Time • Pens for Ties</p>}
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 w-full max-w-xs mb-6">
                                        <button
                                            onClick={() => setIsRunning(!isRunning)}
                                            className={`col-span-2 py-3 rounded-lg font-bold text-white transition-colors shadow-lg ${isRunning ? 'bg-orange-600 hover:bg-orange-500' : 'bg-blue-600 hover:bg-blue-500'}`}
                                        >
                                            {isRunning ? 'Pause Timer' : 'Start Timer'}
                                        </button>
                                        <button onClick={() => setTime(0)} className="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded">Reset Time</button>
                                        <button onClick={() => setHalf(h => h === 1 ? 2 : 1)} className="bg-slate-700 hover:bg-slate-600 text-white py-2 rounded">Toggle Half</button>
                                    </div>

                                    <div className="w-full max-w-xs border-t border-slate-700 pt-4 mb-4">
                                        <label className="block text-sm font-medium text-slate-400 mb-2 text-center">Added Time (Mins)</label>
                                        <div className="flex gap-2">
                                            {[0, 1, 2, 3, 4, 5].map(mins => (
                                                <button
                                                    key={mins}
                                                    onClick={() => setExtraTime(mins)}
                                                    className={`flex-1 py-1 rounded text-sm font-bold ${extraTime === mins ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}
                                                >
                                                    +{mins}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Penalty Shootout Controls */}
                                    {(matchPhase === 'Semi Final' || matchPhase === 'Final') && (
                                        <div className="w-full max-w-xs border-t border-slate-700 pt-4 mb-4">
                                            <button
                                                onClick={() => setPenalties({ ...penalties, active: !penalties.active })}
                                                className={`w-full py-2 mb-3 rounded-lg text-sm font-bold transition-colors shadow-md ${penalties.active ? 'bg-purple-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                            >
                                                {penalties.active ? 'Hide Penalty UI' : 'Start Penalty Shootout'}
                                            </button>

                                            {penalties.active && (
                                                <div className="flex flex-col gap-3 bg-slate-900/80 p-3 rounded border border-slate-700">
                                                    <div className="flex flex-col w-full">
                                                        <div className="flex justify-between items-center mb-1">
                                                            <span className="text-xs font-bold text-slate-300">{team1.code} Kicks ({penScore1})</span>
                                                            <button onClick={() => undoPenaltyKick(1)} className="text-[10px] text-slate-500 hover:text-slate-300 uppercase tracking-widest">Undo</button>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => handlePenaltyKick(1, 'goal')} className="flex-1 bg-green-600/20 hover:bg-green-600 text-green-400 hover:text-white border border-green-600/50 py-1.5 rounded text-sm font-bold transition-colors">⚽ Goal</button>
                                                            <button onClick={() => handlePenaltyKick(1, 'miss')} className="flex-1 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-600/50 py-1.5 rounded text-sm font-bold transition-colors">❌ Miss</button>
                                                        </div>
                                                    </div>

                                                    <div className="h-px w-full bg-slate-700/50"></div>

                                                    <div className="flex flex-col w-full">
                                                        <div className="flex justify-between items-center mb-1">
                                                            <span className="text-xs font-bold text-slate-300">{team2.code} Kicks ({penScore2})</span>
                                                            <button onClick={() => undoPenaltyKick(2)} className="text-[10px] text-slate-500 hover:text-slate-300 uppercase tracking-widest">Undo</button>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => handlePenaltyKick(2, 'goal')} className="flex-1 bg-green-600/20 hover:bg-green-600 text-green-400 hover:text-white border border-green-600/50 py-1.5 rounded text-sm font-bold transition-colors">⚽ Goal</button>
                                                            <button onClick={() => handlePenaltyKick(2, 'miss')} className="flex-1 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-600/50 py-1.5 rounded text-sm font-bold transition-colors">❌ Miss</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <button
                                    onClick={() => setBroadcastMode(true)}
                                    className="mt-auto w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-lg shadow-[0_0_15px_rgba(5,150,105,0.4)] transition-all transform hover:scale-[1.02]"
                                >
                                    ENTER BROADCAST VIEW
                                </button>
                            </div>

                            {/* Right Column: Team 2 Controls & Events Log */}
                            <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg flex flex-col">
                                <h2 className="text-xl font-bold text-slate-300 mb-4 border-b border-slate-700 pb-2 flex items-center justify-end gap-3">
                                    Away Team Control <img onError={handleImageError} src={team2.flag} alt="flag" className="w-8 h-5 object-cover rounded-sm shadow-sm" />
                                </h2>

                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-slate-400 mb-1 text-right">Select Nation</label>
                                    <select
                                        value={team2.code}
                                        onChange={(e) => setTeam2(NATION_OPTIONS.find(n => n.code === e.target.value))}
                                        className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none dir-rtl"
                                        dir="rtl"
                                    >
                                        {NATION_OPTIONS.map(nation => (
                                            <option key={nation.code} value={nation.code}>{nation.name} {nation.emoji}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="flex flex-col items-center bg-slate-900/50 p-6 rounded-lg mb-6">
                                    <span className="text-5xl font-black mb-4 text-white tabular-nums">{score2}</span>
                                    <div className="flex gap-3 w-full flex-row-reverse">
                                        <button onClick={() => handleScoreChange(2, -1)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">-1</button>
                                        <button onClick={() => handleScoreChange(2, 1)} className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors shadow-[0_0_10px_rgba(22,163,74,0.3)]">GOAL!</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-2 mb-6">
                                    <button onClick={() => addEvent(team2.code, 'YELLOW')} className="bg-yellow-500 hover:bg-yellow-400 text-yellow-900 font-bold py-2 rounded shadow-sm">Yellow Card</button>
                                    <button onClick={() => addEvent(team2.code, 'RED')} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded shadow-sm">Red Card</button>
                                </div>

                                {/* Starting VII Toggle */}
                                <button
                                    onClick={() => setSquadDisplay({ active: squadDisplay.teamNum !== 2 || !squadDisplay.active, teamNum: 2 })}
                                    className={`mb-6 w-full py-3 rounded-lg font-bold uppercase tracking-wider transition-all duration-300 ${squadDisplay.active && squadDisplay.teamNum === 2 ? 'bg-indigo-600 text-white shadow-inner scale-[0.98]' : 'bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600 hover:border-slate-500 shadow-md'}`}
                                >
                                    {squadDisplay.active && squadDisplay.teamNum === 2 ? 'Hide Starting VII' : 'Show Starting VII Graphic'}
                                </button>

                                {/* Event Log */}
                                <div className="flex-1 mt-4 border-t border-slate-700 pt-4 flex flex-col">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-bold text-slate-300">Match Log</h3>
                                        <button onClick={() => setEvents([])} className="text-xs text-red-400 hover:text-red-300">Clear</button>
                                    </div>
                                    <div className="flex-1 bg-slate-900 rounded border border-slate-700 p-2 overflow-y-auto max-h-40">
                                        {events.length === 0 ? (
                                            <p className="text-slate-500 text-sm text-center mt-4 italic">No events yet.</p>
                                        ) : (
                                            <ul className="space-y-1">
                                                {events.map((ev, idx) => (
                                                    <li key={idx} className="text-sm flex items-center border-b border-slate-800 pb-1">
                                                        <span className="text-blue-400 font-mono w-8">{ev.time}'</span>
                                                        <span className="font-bold text-white w-10">{ev.team}</span>
                                                        {ev.type === 'GOAL' && <span className="text-green-400 font-bold ml-2">⚽ GOAL</span>}
                                                        {ev.type === 'YELLOW' && <span className="bg-yellow-500 w-3 h-4 inline-block ml-2 rounded-sm shadow-sm border border-yellow-600"></span>}
                                                        {ev.type === 'RED' && <span className="bg-red-600 w-3 h-4 inline-block ml-2 rounded-sm shadow-sm border border-red-800"></span>}
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>
                                </div>
                            </div>

                            { }
                            {/* Bottom Row: Broadcast Overlays Control Panels */}
                            <div className="col-span-1 lg:col-span-3 grid grid-cols-1 lg:grid-cols-2 gap-6 mt-2">

                                {/* Player & Event Graphics Control */}
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                                    <h2 className="text-xl font-bold text-slate-300 mb-5 border-b border-slate-700 pb-2">Player & Event Graphics (Lower Thirds)</h2>

                                    <div className="grid grid-cols-2 gap-4 mb-5">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Select Team</label>
                                            <select
                                                value={graphicTeamNum}
                                                onChange={e => setGraphicTeamNum(Number(e.target.value))}
                                                className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            >
                                                <option value={1}>{team1.name}</option>
                                                <option value={2}>{team2.name}</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Select Player</label>
                                            <select
                                                value={graphicPlayerName}
                                                onChange={e => setGraphicPlayerName(e.target.value)}
                                                className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            >
                                                {(graphicTeamNum === 1 ? team1 : team2).squad.map((p, idx) => (
                                                    <option key={idx} value={p.name}>{p.pos} - {p.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                                        <button onClick={() => triggerPlayerGraphic('GOAL')} className="bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded text-xs uppercase tracking-wide shadow-sm transition-colors">Goal Scorer</button>
                                        <button onClick={() => triggerPlayerGraphic('YELLOW_CARD')} className="bg-yellow-500 hover:bg-yellow-400 text-yellow-950 font-bold py-2 rounded text-xs uppercase tracking-wide shadow-sm transition-colors">Yellow Card</button>
                                        <button onClick={() => triggerPlayerGraphic('RED_CARD')} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded text-xs uppercase tracking-wide shadow-sm transition-colors">Red Card</button>
                                        <button onClick={() => triggerPlayerGraphic('MOTM')} className="bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-amber-950 font-bold py-2 rounded text-xs uppercase tracking-wide shadow-sm transition-colors">MOTM</button>
                                    </div>

                                    <button
                                        onClick={() => setPlayerGraphic({ active: false, type: '', player: null, team: null })}
                                        className={`w-full py-3 rounded font-bold uppercase tracking-widest transition-colors ${playerGraphic.active ? 'bg-slate-200 text-slate-900 hover:bg-white' : 'bg-slate-900 text-slate-600 cursor-not-allowed'}`}
                                        disabled={!playerGraphic.active}
                                    >
                                        Hide Player Graphic
                                    </button>
                                </div>

                                {/* General Overlays Panel (L-Bar & Ticker) */}
                                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg flex flex-col justify-between">
                                    <h2 className="text-xl font-bold text-slate-300 mb-5 border-b border-slate-700 pb-2">Stream Overlays (L-Bar & Ticker)</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {/* Sponsor Control */}
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center bg-slate-900/50 p-2.5 rounded border border-slate-700">
                                                <label className="text-xs font-bold text-slate-300 uppercase tracking-wider">L-Shape Ad</label>
                                                <button onClick={() => setOverlayL(!overlayL)} className={`px-3 py-1.5 rounded font-bold text-[10px] uppercase tracking-wide transition-colors ${overlayL ? 'bg-amber-500 text-amber-950 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                                    {overlayL ? 'Hide Ad' : 'Show Ad'}
                                                </button>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Active Sponsor</label>
                                                <select
                                                    value={activeSponsorIndex}
                                                    onChange={e => setActiveSponsorIndex(Number(e.target.value))}
                                                    className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm focus:ring-2 focus:ring-amber-500 outline-none"
                                                >
                                                    {SPONSOR_OPTIONS.map((s, idx) => (
                                                        <option key={idx} value={idx}>{s.name} ({s.type})</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>

                                        {/* Ticker Control */}
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center bg-slate-900/50 p-2.5 rounded border border-slate-700">
                                                <label className="text-xs font-bold text-slate-300 uppercase tracking-wider">News Ticker</label>
                                                <button onClick={() => setOverlayTicker(!overlayTicker)} className={`px-3 py-1.5 rounded font-bold text-[10px] uppercase tracking-wide transition-colors ${overlayTicker ? 'bg-amber-500 text-amber-950 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                                    {overlayTicker ? 'Hide Ticker' : 'Show Ticker'}
                                                </button>
                                            </div>
                                            <div>
                                                <input type="text" value={tickerText1} onChange={e => setTickerText1(e.target.value)} placeholder="Last Match Info" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm focus:ring-2 focus:ring-amber-500 outline-none mb-2" />
                                                <input type="text" value={tickerText2} onChange={e => setTickerText2(e.target.value)} placeholder="Upcoming Info" className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm focus:ring-2 focus:ring-amber-500 outline-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            {/* Custom Confirmation Modal for Reset */}
                            {showResetConfirm && (
                                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center">
                                    <div className="bg-slate-800 border border-slate-600 p-8 rounded-2xl max-w-sm w-full mx-4 shadow-2xl text-center">
                                        <h3 className="text-white font-black text-2xl mb-3">Reset Match?</h3>
                                        <p className="text-slate-300 text-sm mb-8">Are you sure you want to reset the entire match? Scores, time, and match logs will be lost forever.</p>
                                        <div className="flex gap-4 justify-center">
                                            <button
                                                onClick={() => setShowResetConfirm(false)}
                                                className="px-5 py-2.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-white font-bold transition-colors"
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                onClick={executeReset}
                                                className="px-5 py-2.5 rounded-lg bg-red-600 hover:bg-red-500 text-white font-bold shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-colors"
                                            >
                                                Yes, Reset
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Danger Zone Bottom Bar */}
                            <div className="col-span-1 lg:col-span-3 flex justify-end mt-2">
                                <button onClick={() => setShowResetConfirm(true)} className="text-red-500 hover:text-red-400 text-sm font-bold flex items-center gap-1 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
                                    </svg>
                                    Reset Entire Match
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HelixScoreboard />);
    </script>
</body>

</html>
